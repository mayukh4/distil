<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@200;300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <div class="time-widget">
            <div id="greeting" class="greeting"></div>
            <div id="time" class="time"></div>
            <div id="date" class="date"></div>
            <div id="pomodoro-widget" class="pomodoro-widget">
                <div class="pomodoro-ring-container">
                    <svg class="pomodoro-ring-svg" width="44" height="44" viewBox="0 0 44 44">
                        <circle cx="22" cy="22" r="18" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="3"/>
                        <circle id="pomodoro-ring" cx="22" cy="22" r="18" fill="none" stroke="var(--accent)" stroke-width="3"
                            stroke-linecap="round" transform="rotate(-90 22 22)"
                            stroke-dasharray="113.1" stroke-dashoffset="113.1"/>
                    </svg>
                </div>
                <div class="pomodoro-info">
                    <span id="pomodoro-time" class="pomodoro-time">25:00</span>
                    <span id="pomodoro-label" class="pomodoro-label">Focus</span>
                </div>
                <div class="pomodoro-controls">
                    <button id="pomodoro-start" class="pomodoro-btn">Start</button>
                    <button id="pomodoro-reset" class="pomodoro-btn pomodoro-reset" title="Reset">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <path d="m20.49 15A9 9 0 1 1 21 12"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="weather-widget">
            <div id="weather-display" class="hidden" title="Click to change city">
                <div id="weather-icon"></div>
                <span id="temp"></span>
                <span id="description"></span>
            </div>
            <div class="city-input-container">
                <input type="text" id="city-input" placeholder="Enter city..." />
                <button id="set-city">Set</button>
            </div>
            <button id="notes-toggle" class="icon-toggle-btn" title="Toggle Notes">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
            </button>
            <button id="news-expand-btn" class="icon-toggle-btn hidden" title="Toggle Research Panel">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="3" y1="9" x2="21" y2="9"></line>
                    <line x1="9" y1="21" x2="9" y2="9"></line>
                </svg>
            </button>
        </div>

        <div id="quick-links" class="quick-links"></div>

        <div class="main-content notes-collapsed">
            <div class="notes-widget collapsed">
                <div class="notes-header">
                    <h3>Notes</h3>
                    <div class="notes-actions">
                        <button id="download-notes" title="Download as .txt">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                        </button>
                    </div>
                </div>
                <textarea id="notes" placeholder="Quick notes & links..."></textarea>
            </div>

            <div id="news-panel" class="news-panel">
                <div class="news-header">
                    <div class="news-tabs">
                        <button class="news-tab active" data-source="papers">Papers</button>
                        <button class="news-tab" data-source="news">News</button>
                        <button class="news-tab" data-source="hn">HN</button>
                    </div>
                    <div class="news-header-actions">
                        <button id="news-refresh-btn" class="icon-toggle-btn" title="Refresh Data">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="23 4 23 10 17 10"></polyline>
                                <polyline points="1 20 1 14 7 14"></polyline>
                                <path d="m3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                            </svg>
                        </button>
                        <button id="news-collapse-btn" class="icon-toggle-btn" title="Collapse Panel">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </button>
                    </div>
                </div>
                <div id="news-content" class="news-content">
                    <div class="loading">Fetching latest data...</div>
                </div>
            </div>
        </div>

        <div id="apod-info" class="apod-info hidden">
            <div class="apod-header">
                <span id="apod-title"></span>
                <button id="apod-toggle" title="Show/Hide Details">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="18 15 12 9 6 15"></polyline>
                    </svg>
                </button>
            </div>
            <div id="apod-explanation" class="apod-explanation collapsed"></div>
            <div id="apod-date" class="apod-date"></div>
        </div>

        <!-- Zen Mode Toggle Button -->
        <button id="zen-toggle-btn" class="zen-toggle-btn" title="Focus Mode (Z)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <circle cx="12" cy="12" r="4"></circle>
            </svg>
        </button>

        <!-- APOD Toggle Button (Bottom Right) -->
        <button id="apod-toggle-btn" class="apod-toggle-btn-corner" title="Toggle NASA APOD Background (Currently Off)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                <circle cx="12" cy="13" r="4"></circle>
            </svg>
        </button>
    </div>

    <script src="constants.js"></script>
    <script src="script.js"></script>
</body>

</html>
