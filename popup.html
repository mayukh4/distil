<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distil Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="popup-container">
        <div class="popup-header">
            <h1>Distil</h1>
            <span class="popup-subtitle">Settings</span>
        </div>

        <div class="section">
            <h2>Profile</h2>
            <div class="profile-settings">
                <input type="text" id="popup-name" placeholder="Your name..." />
            </div>
        </div>

        <div class="section">
            <h2>Quick Links</h2>
            <div id="quick-links-list" class="quick-links-list"></div>
            <div class="quick-link-add">
                <input type="text" id="ql-name" placeholder="Name (optional)" />
                <input type="text" id="ql-url" placeholder="URL" />
                <button id="ql-add-btn" title="Add link">+</button>
            </div>
            <div class="ql-hint">Max 8 links. Drag to reorder.</div>
        </div>

        <div class="section">
            <h2>arXiv Categories</h2>
            <div id="arxiv-selector"></div>
        </div>

        <div class="section">
            <h2>News Topics</h2>
            <div id="news-topic-selector" class="chip-grid"></div>
        </div>

        <div class="section">
            <h2>Weather</h2>
            <div class="weather-api-row">
                <input type="text" id="popup-weather-key" placeholder="OpenWeatherMap API key..." />
                <a href="https://openweathermap.org/appid" target="_blank" class="api-help" title="Get a free API key">?</a>
            </div>
            <div class="weather-settings">
                <input type="text" id="popup-city" placeholder="City name..." />
                <div class="temp-toggle">
                    <button id="temp-c" class="temp-btn active">°C</button>
                    <button id="temp-f" class="temp-btn">°F</button>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>Background</h2>
            <div class="toggle-row">
                <span>NASA Astronomy Picture of the Day</span>
                <button id="apod-toggle" class="toggle-switch"></button>
            </div>
        </div>
    </div>

    <script src="constants.js"></script>
    <script src="popup.js"></script>
</body>

</html>
